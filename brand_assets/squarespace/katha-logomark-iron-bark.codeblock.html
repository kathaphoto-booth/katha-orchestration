<div style="width: 100%; max-width: 100%; display: flex; justify-content: center;">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" role="img" aria-label="Katha logomark">
  <!--
    Katha "K" Logomark — Bold geometric K monogram
    
    Construction: A bold, structured uppercase K built from three clean 
    geometric strokes. The vertical stem is full-height and weighted.
    The upper diagonal arm reaches to the top-right corner.
    The lower diagonal arm reaches to the bottom-right but is slightly
    shorter (Fukinsei asymmetry) — the bottom-right corner is deckled.
    
    The negative space between the arms creates a subtle arrow/forward 
    motion, representing perseverance and forward weaving.
    
    Visible at favicon scale. Works debossed on booth plates.
  -->
  <defs>
    <!-- Calado texture band — subtle drawn-thread openwork visible inside the K strokes -->
    <pattern id="calado-texture" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="currentColor" opacity="0"/>
      <line x1="0" y1="3" x2="6" y2="3" stroke="currentColor" stroke-width="0.3" opacity="0.15"/>
      <circle cx="3" cy="3" r="0.4" fill="currentColor" opacity="0.12"/>
    </pattern>
  </defs>
  
  <g fill="currentColor">
    <!-- Vertical stem -->
    <rect x="40" y="28" width="38" height="184" rx="2"/>
    
    <!-- Upper diagonal arm -->
    <polygon points="78,110 78,80 200,28 200,68"/>
    
    <!-- Lower diagonal arm (slightly shorter — Fukinsei) -->
    <polygon points="78,130 78,160 188,212 188,176"/>
    
    <!-- Calado texture overlay on the stem -->
    <rect x="40" y="28" width="38" height="184" rx="2" fill="url(#calado-texture)"/>
  </g>
</svg>

</div>
