<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" role="img" aria-label="Binakul optical weave pattern">
  <g fill="currentColor">
    <!-- Center whirlpool focal point -->
    <rect x="110" y="110" width="20" height="20" />
    
    <!-- Concentric optical rings -->
    <path d="M 80 80 h 80 v 20 h -60 v 60 h 80 v -80 h 20 v 100 h -120 z" />
    <path d="M 50 50 h 140 v 20 h -120 v 120 h 140 v -140 h 20 v 160 h -180 z" />
    <path d="M 20 20 h 200 v 20 h -180 v 180 h 200 v -200 h 20 v 220 h -240 z" />
    
    <!-- Broken diagonal symmetry (fukinsei/apotropaic disruption) -->
    <rect x="0" y="220" width="20" height="20" />
    <rect x="220" y="0" width="20" height="20" />
    <rect x="40" y="40" width="20" height="20" />
    <rect x="180" y="180" width="20" height="20" />
    <rect x="80" y="140" width="20" height="20" />
    <rect x="140" y="80" width="20" height="20" />
  </g>
</svg>
