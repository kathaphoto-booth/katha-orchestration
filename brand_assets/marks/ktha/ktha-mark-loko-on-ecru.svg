    <rect x="60" y="48" width="6" height="64"/>
    <polygon points="66,80 66,72 96,48 104,48 104,56"/>
    <polygon points="66,80 66,88 96,112 104,112 104,104"/>
    <rect x="140" y="48" width="44" height="6"/>
    <rect x="159" y="48" width="6" height="64"/>
    <rect x="216" y="48" width="6" height="64"/>
    <rect x="216" y="76" width="40" height="6"/>
