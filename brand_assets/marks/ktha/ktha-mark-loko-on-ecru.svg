      <line x1="1" y1="2" x2="7" y2="2" stroke="#8C382A" stroke-width="0.5" opacity="0.5"/>
      <line x1="1" y1="6" x2="7" y2="6" stroke="#8C382A" stroke-width="0.5" opacity="0.5"/>
      <line x1="1" y1="10" x2="7" y2="10" stroke="#8C382A" stroke-width="0.5" opacity="0.5"/>
      <line x1="1" y1="0" x2="1" y2="12" stroke="#8C382A" stroke-width="0.3" opacity="0.35"/>
      <line x1="7" y1="0" x2="7" y2="12" stroke="#8C382A" stroke-width="0.3" opacity="0.35"/>
      <circle cx="1" cy="2" r="0.5" fill="#8C382A" opacity="0.3"/>
      <circle cx="7" cy="6" r="0.5" fill="#8C382A" opacity="0.3"/>
      <circle cx="1" cy="10" r="0.5" fill="#8C382A" opacity="0.3"/>
