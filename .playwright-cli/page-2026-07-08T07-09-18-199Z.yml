      - heading "A whole store from one photo." [level=1] [ref=e13]:
        - text: A whole store
        - text: from
        - emphasis [ref=e14]: one photo.
      - paragraph [ref=e15]: ORBIT is a real-time 3D product configurator for a chair that never existed. It began as a single generated product shot, became a textured 3D mesh, and ended as a store you can spin, re-upholster, and measure — all in the browser, no build step. Here is exactly how it was made, including the parts that didn't work.
    - main [ref=e16]:
      - generic [ref=e17]:
        - heading "Brief & concept" [level=2] [ref=e18]
        - paragraph [ref=e19]: "The assignment was site 23 of 25: \"one chair, configurable.\" A Three.js viewer with orbit controls, studio lighting, a soft shadow catcher, material swatches that morph live, an updating price, and a dimension overlay — the flex being real-time 3D that feels like a premium DTC store, the kind of page where a furniture brand sells a $3,000 lounge chair."
        - paragraph [ref=e20]: "So the first job wasn't code — it was a fiction worth building. The chair became The Halcyon, a bent-plywood lounge in a fictional \"Edition 03.\" The copy commits to it: nine plies of steam-bent walnut, pressed over a two-tonne form, boucle woven in Kortrijk. A configurator only feels premium if the words around it believe the product is real."
      - generic [ref=e21]:
        - heading "Assets & provenance — the pipeline star" [level=2] [ref=e22]
        - paragraph [ref=e23]: "There is no photographer, no 3D modeller, and no product. The entire chair came from a two-step generative pipeline:"
