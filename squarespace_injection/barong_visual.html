  <title>Katha - Raw Barong Texture Reference</title>
  <style>

      padding: 0;

      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: #EAE2D5;

      object-fit: contain;

    .label {
      margin-top: 2rem;
      font-size: 0.75rem;

  <div class="texture-container">
