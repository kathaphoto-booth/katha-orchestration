<!-- ============================================================================
     KATHA · GALLERY TEASER     Squarespace Code Block  (Insert → Code)
     Requires 00_code-injection-header.html installed site-wide first.
     The product pillar — sheer-Piña tiles, tailoring seams, links to /gallery.
============================================================================ -->
<div class="katha-gallery">
  <div class="katha-gallery-inner">
    <p class="katha-eyebrow">THE GALLERY</p>
    <h2 class="katha-h2 katha-gallery-h2">See the work.<br>Then commission.</h2>

    <!-- 3×2 grid; first tile spans two rows (deliberate asymmetry).
         The 1px Ecru gap/border renders the seams between tiles as tailoring lines. -->
    <div class="katha-grid">
      <a class="katha-glass katha-tile katha-tile--tall" href="/gallery"><span class="katha-tile-label">Portrait</span></a>
      <a class="katha-glass katha-tile" href="/gallery"><span class="katha-tile-label">Detail</span></a>
      <a class="katha-glass katha-tile" href="/gallery"><span class="katha-tile-label">The Booth</span></a>
      <a class="katha-glass katha-tile" href="/gallery"><span class="katha-tile-label">Texture</span></a>
      <a class="katha-glass katha-tile" href="/gallery"><span class="katha-tile-label">The Mark</span></a>
    </div>

    <a class="katha-gallery-link" href="/gallery">Enter the Gallery&nbsp;&nbsp;&rarr;</a>
  </div>
</div>

<style>
  .katha-gallery{ padding:7rem 6vw; }
  .katha-gallery-inner{ max-width:1100px; margin:0 auto; }
  .katha-gallery-h2{ font-size:clamp(2rem,4.5vw,3rem); margin:.6rem 0 3rem; max-width:24rem; }

  .katha-grid{ display:grid; grid-template-columns:repeat(3,1fr); grid-auto-rows:200px;
    gap:1px; background:rgba(234,226,213,.2); border:1px solid rgba(234,226,213,.2); }
  .katha-tile{ display:flex; align-items:flex-end; padding:1.1rem; text-decoration:none; }
  .katha-tile--tall{ grid-row:span 2; }
  .katha-tile-label{ font-family:var(--mono); font-size:.6rem; letter-spacing:.14em;
    text-transform:uppercase; color:var(--champagne); }

  .katha-gallery-link{ display:inline-block; margin-top:2.4rem; font-family:var(--ui);
    font-size:.8rem; letter-spacing:.16em; text-transform:uppercase; font-weight:600;
    color:var(--ecru); text-decoration:none; border-bottom:1px solid rgba(234,226,213,.4);
    padding-bottom:.3rem; transition:border-color .3s; }
  .katha-gallery-link:hover{ border-color:var(--loko); }

  @media(max-width:640px){
    .katha-grid{ grid-template-columns:repeat(2,1fr); }
    .katha-gallery-h2{ font-size:1.9rem; }
  }
</style>
